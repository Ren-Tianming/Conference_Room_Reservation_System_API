version: "3.9"

services:
  db:
    image: postgres:16
    container_name: conference_room_db
    environment:
      POSTGRES_DB: conference_room
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d conference_room"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: conference_room_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: conference_room_backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/streamlit_app
    container_name: conference_room_frontend
    env_file:
      - ./frontend/streamlit_app/.env
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  postgres_data:
