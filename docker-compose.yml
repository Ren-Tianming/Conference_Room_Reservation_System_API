version: "3.9"

services:
  db:
    image: mysql:8.4
    container_name: conference_room_mysql
    environment:
      MYSQL_DATABASE: conference_room
      MYSQL_USER: conference_user
      MYSQL_PASSWORD: conference_password
      MYSQL_ROOT_PASSWORD: root_password
      TZ: Asia/Tokyo
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u conference_user -pconference_password --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: conference_room_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: conference_room_backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: mysql+pymysql://conference_user:conference_password@db:3306/conference_room?charset=utf8mb4
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/streamlit_app
    container_name: conference_room_frontend
    env_file:
      - ./frontend/streamlit_app/.env
    environment:
      BACKEND_BASE_URL: http://backend:8000/api/v1
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  mysql_data:
