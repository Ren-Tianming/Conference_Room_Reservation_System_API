name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    name: Lint, type check, and unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend and CI dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Lint with Ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy .

      - name: Run unit tests
        run: pytest -q tests/unit

  dependency-security:
    name: Dependency security scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: python -m pip install pip-audit==2.8.0

      - name: Audit backend runtime dependencies
        run: pip-audit -r backend/requirements.txt

      - name: Audit frontend runtime dependencies
        run: pip-audit -r frontend/streamlit_app/requirements.txt

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build --tag conference-room-backend:ci ./backend

      - name: Build frontend image
        run: docker build --tag conference-room-frontend:ci ./frontend/streamlit_app

  mysql-redis-integration:
    name: MySQL, Redis, and migration checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Run integration and migration tests
        run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from integration-tests

      - name: Tear down integration services
        if: always()
        run: docker compose -f docker-compose.test.yml down --volumes --remove-orphans
